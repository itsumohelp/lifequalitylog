name: Claude PR Auto Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@beta
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            このPRのコードをレビューしてください。
            以下の観点でチェックし、結果を日本語でPRコメントとして投稿してください。
            - ルール:
            - コメント、説明、改善提案は日本語
            - コード例はTypeScript/SQLのまま
            - 以下の形式で出力
            - 問題:
            - 原因:
            - 修正案:
            - 影響範囲:
            - 問題がなければその旨も簡潔に書いてください。
            
